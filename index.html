<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Netflix Clone</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <img class="navbar-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"
      alt="Netflix Logo">
    <div class="navbar-right">
      <div class="search-wrapper">
        <span class="material-symbols-outlined search-icon">search</span>
        <input class="search-bar" type="text" placeholder="Search movies..." id="search-input">
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <button class="sign-in-btn">Sign In</button>
    </div>
  </nav>

  <div class="search-overlay" id="search-overlay"></div>
  <div class="page-content" id="page-content">
    <!-- HERO BANNER -->
    <section class="hero">

      <!-- Background video — will play trailer here in Phase 4 -->
      <video class="hero-video" autoplay muted loop></video>

      <!-- Dark overlay so text is readable over video/image -->
      <div class="hero-overlay"></div>

      <!-- LEFT ARROW -->
      <button class="hero-arrow hero-arrow-left">&#8249;</button>

      <!-- HERO CONTENT -->
      <div class="hero-content">

        <!-- Show logo as IMAGE not text — official font/style of each show -->
        <img class="hero-logo-img" src="/stranger_things.png" alt="Stranger Things">

        <!-- Description is hidden by default, only shows on hover -->
        <div class="hero-description-wrapper">
          <p class="hero-description">
            When a boy vanishes, a small town uncovers a mystery
            involving secret experiments, terrifying supernatural
            forces and one very strange little girl.
          </p>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="hero-buttons">
          <button class="btn-play">&#9654; Play</button>
          <button class="btn-favorite">
            <span class="material-symbols-outlined">add</span>
          </button>
          <button class="btn-info">&#9432; More Info</button>
        </div>

      </div>

      <!-- RIGHT ARROW -->
      <button class="hero-arrow hero-arrow-right">&#8250;</button>

      <!-- NAVIGATION DOTS -->
      <div class="hero-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

    </section>

    <!-- MOVIE ROWS -->
    <main class="movies-container">

      <!-- Row 1: Trending Now -->
      <div class="movie-row">
        <h2 class="row-title">Trending Now</h2>
        <div class="row-cards" id="trending-row">
          <!-- JavaScript will fill this with real cards -->
        </div>
      </div>

      <!-- Row 2: Top Rated -->
      <div class="movie-row">
        <h2 class="row-title">Top Rated</h2>
        <div class="row-cards" id="toprated-row">
          <!-- JavaScript will fill this with real cards -->
        </div>
      </div>

      <!-- Row 3: Action Movies -->
      <div class="movie-row">
        <h2 class="row-title">Action Movies</h2>
        <div class="row-cards" id="action-row">
          <!-- JavaScript will fill this with real cards -->
        </div>
      </div>

    </main>
    <!-- Blur overlay for search focus -->
  </div>
  <script type="module" src="script.js"></script>
</body>

</html>
